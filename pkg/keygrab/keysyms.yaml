# X11 Keysym definitions
# Format matches xev output (case-insensitive)

Navigation:
  Left: 0xFF51
  Right: 0xFF53
  Up: 0xFF52
  Down: 0xFF54
  Home: 0xFF50
  End: 0xFF57
  Prior: 0xFF55      # Page_Up
  Page_Up: 0xFF55
  PageUp: 0xFF55
  Next: 0xFF56       # Page_Down
  Page_Down: 0xFF56
  PageDown: 0xFF56

Editing:
  Insert: 0xFF63
  Delete: 0xFFFF
  BackSpace: 0xFF08

Special:
  Tab: 0xFF09
  Space: 0x0020
  Return: 0xFF0D
  Enter: 0xFF0D
  Escape: 0xFF1B
  Esc: 0xFF1B
  grave: 0x0060      # backtick
  backtick: 0x0060
  "`": 0x0060

Function:
  F1: 0xFFBE
  F2: 0xFFBF
  F3: 0xFFC0
  F4: 0xFFC1
  F5: 0xFFC2
  F6: 0xFFC3
  F7: 0xFFC4
  F8: 0xFFC5
  F9: 0xFFC6
  F10: 0xFFC7
  F11: 0xFFC8
  F12: 0xFFC9

Letters:
  a: 0x0061
  b: 0x0062
  c: 0x0063
  d: 0x0064
  e: 0x0065
  f: 0x0066
  g: 0x0067
  h: 0x0068
  i: 0x0069
  j: 0x006A
  k: 0x006B
  l: 0x006C
  m: 0x006D
  n: 0x006E
  o: 0x006F
  p: 0x0070
  q: 0x0071
  r: 0x0072
  s: 0x0073
  t: 0x0074
  u: 0x0075
  v: 0x0076
  w: 0x0077
  x: 0x0078
  y: 0x0079
  z: 0x007A

Numbers:
  "0": 0x0030
  "1": 0x0031
  "2": 0x0032
  "3": 0x0033
  "4": 0x0034
  "5": 0x0035
  "6": 0x0036
  "7": 0x0037
  "8": 0x0038
  "9": 0x0039
